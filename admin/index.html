<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — UangKu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #5a52d5;
            --primary-glow: rgba(108,99,255,0.25);
            --accent: #ff6584;
            --success: #22d3a5;
            --danger: #ff5252;
            --warning: #fbbf24;
            --blue: #60a5fa;
            --bg: #0d0d1a;
            --bg2: #12122a;
            --surface: rgba(255,255,255,0.04);
            --surface2: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --text: #f0f0ff;
            --text-muted: #7878a0;
            --text-sub: #a0a0c0;
            --t: 0.3s cubic-bezier(0.4,0,0.2,1);
            --radius: 16px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Plus Jakarta Sans',sans-serif;
            background:var(--bg); color:var(--text); min-height:100vh;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
            background-size:48px 48px; pointer-events:none; z-index:0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position:sticky; top:0; z-index:100;
            background:rgba(13,13,26,0.9);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 24px; height:64px;
        }
        .nav-left { display:flex; align-items:center; gap:10px; min-width:0; }
        .nav-brand-icon {
            width:38px; height:38px; flex-shrink:0;
            background:linear-gradient(135deg,#ff6584,#e94560);
            border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px;
        }
        .nav-brand {
            font-size:18px; font-weight:800; white-space:nowrap;
            background:linear-gradient(135deg,#fff 40%,var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .admin-badge {
            background:rgba(255,101,132,0.15); border:1px solid rgba(255,101,132,0.25);
            color:var(--accent); border-radius:20px; padding:2px 10px;
            font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
            white-space:nowrap; flex-shrink:0;
        }
        .nav-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .user-info {
            display:flex; align-items:center; gap:9px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:50px; padding:5px 12px 5px 5px;
        }
        .user-avatar {
            width:30px; height:30px; border-radius:50%; flex-shrink:0;
            background:linear-gradient(135deg,var(--accent),#e94560);
            display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:700; color:#fff;
        }
        .user-details { display:flex; flex-direction:column; line-height:1.2; }
        .user-name { font-size:12px; font-weight:600; }
        .user-email { font-size:10px; color:var(--text-muted); }
        .btn-logout {
            display:flex; align-items:center; gap:5px;
            background:rgba(255,82,82,0.12); border:1px solid rgba(255,82,82,0.2);
            color:#ff8080; border-radius:9px; padding:7px 12px;
            font-family:inherit; font-size:12px; font-weight:600;
            cursor:pointer; transition:var(--t); white-space:nowrap;
        }
        .btn-logout:hover { background:rgba(255,82,82,0.22); transform:translateY(-1px); }

        /* ── MAIN ── */
        .main {
            max-width:1400px; margin:0 auto;
            padding:24px 24px 60px;
            position:relative; z-index:1;
        }

        /* ── STAT CARDS ── */
        .stats-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:16px; margin-bottom:28px;
        }
        .stat-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:20px;
            position:relative; overflow:hidden; transition:var(--t);
            animation:cardIn 0.5s cubic-bezier(0.4,0,0.2,1) both;
        }
        .stat-card:nth-child(1){animation-delay:.05s}
        .stat-card:nth-child(2){animation-delay:.1s}
        .stat-card:nth-child(3){animation-delay:.15s}
        .stat-card:nth-child(4){animation-delay:.2s}
        @keyframes cardIn { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
        .stat-card::before {
            content:''; position:absolute; top:0; left:0;
            width:3px; height:100%;
        }
        .s-users::before{background:var(--primary)}
        .s-income::before{background:var(--success)}
        .s-expense::before{background:var(--danger)}
        .s-balance::before{background:var(--warning)}
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,0.3); }
        .stat-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .stat-label { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        .stat-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; }
        .s-users .stat-icon{background:rgba(108,99,255,.12)}
        .s-income .stat-icon{background:rgba(34,211,165,.12)}
        .s-expense .stat-icon{background:rgba(255,82,82,.12)}
        .s-balance .stat-icon{background:rgba(251,191,36,.12)}
        .stat-number { font-size:22px; font-weight:800; }
        .s-users .stat-number{color:var(--primary)}
        .s-income .stat-number{color:var(--success)}
        .s-expense .stat-number{color:var(--danger)}
        .s-balance .stat-number{color:var(--warning)}
        .stat-glow { position:absolute; bottom:-30px; right:-30px; width:90px; height:90px; border-radius:50%; filter:blur(30px); opacity:.1; }
        .s-users .stat-glow{background:var(--primary)}
        .s-income .stat-glow{background:var(--success)}
        .s-expense .stat-glow{background:var(--danger)}
        .s-balance .stat-glow{background:var(--warning)}

        /* ── SECTION HEADER ── */
        .section-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:14px; gap:12px; flex-wrap:wrap;
        }
        .section-title { font-size:17px; font-weight:700; }
        .section-title span { color:var(--accent); }
        .search-bar {
            display:flex; align-items:center; gap:8px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:10px; padding:8px 13px; flex:1; max-width:300px;
        }
        .search-bar input {
            background:none; border:none; outline:none;
            color:var(--text); font-family:inherit; font-size:13px; flex:1; min-width:0;
        }
        .search-bar input::placeholder { color:var(--text-muted); }

        /* ── TABLE WRAPPER — KEY FIX: horizontal scroll ── */
        .table-wrap {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius);
            overflow-x:auto;          /* horizontal scroll on mobile */
            -webkit-overflow-scrolling:touch;
            animation:cardIn .5s .25s cubic-bezier(0.4,0,0.2,1) both;
        }
        /* Subtle scroll hint shadow on right edge */
        .table-wrap::after {
            content:''; pointer-events:none;
            position:sticky; right:0; top:0;
            width:40px; height:100%;
            background:linear-gradient(to left,rgba(13,13,26,.6),transparent);
            display:block; margin-top:-100%;
            float:right;
        }

        table {
            width:100%; border-collapse:collapse;
            /* min-width ensures table never shrinks below readable size */
            min-width:640px;
        }
        thead tr { background:rgba(255,255,255,0.04); }
        th {
            padding:13px 16px; text-align:left;
            font-size:11px; font-weight:700; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:.5px;
            border-bottom:1px solid var(--border);
            white-space:nowrap;
        }
        tbody tr {
            transition:var(--t); border-bottom:1px solid rgba(255,255,255,.03);
            animation:rowIn .4s ease both;
        }
        @keyframes rowIn { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:translateX(0);} }
        tbody tr:hover { background:var(--surface2); }
        tbody tr:last-child { border-bottom:none; }
        td { padding:13px 16px; font-size:13px; vertical-align:middle; white-space:nowrap; }

        .user-cell { display:flex; align-items:center; gap:10px; }
        .user-av {
            width:34px; height:34px; border-radius:50%; flex-shrink:0;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            display:flex; align-items:center; justify-content:center;
            font-size:14px; font-weight:700; color:#fff;
        }
        .user-cell-info { display:flex; flex-direction:column; min-width:0; }
        .user-cell-name { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
        .user-cell-email { font-size:11px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }

        .amount-income { color:var(--success); font-weight:700; }
        .amount-expense { color:var(--danger); font-weight:700; }
        .amount-balance { color:var(--blue); font-weight:700; }

        .btn-view {
            display:inline-flex; align-items:center; gap:5px;
            background:rgba(108,99,255,.12); border:1px solid rgba(108,99,255,.2);
            color:#a5b4fc; border-radius:8px; padding:6px 12px;
            font-family:inherit; font-size:12px; font-weight:600;
            cursor:pointer; transition:var(--t); white-space:nowrap;
        }
        .btn-view:hover { background:rgba(108,99,255,.22); transform:translateY(-1px); }

        /* ── SCROLL HINT TEXT (only on mobile) ── */
        .scroll-hint {
            display:none; font-size:11px; color:var(--text-muted);
            margin-bottom:8px; text-align:right;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.75); z-index:200;
            justify-content:center; align-items:center; padding:16px;
            backdrop-filter:blur(8px);
        }
        .modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .modal {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:22px; width:100%; max-width:620px;
            max-height:88vh; overflow:hidden;
            box-shadow:0 32px 80px rgba(0,0,0,.5);
            display:flex; flex-direction:column;
            animation:modalIn .3s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(.9) translateY(20px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .modal-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 24px; border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .modal-title { font-size:16px; font-weight:700; }
        .modal-close {
            background:var(--surface); border:1px solid var(--border);
            color:var(--text-muted); width:32px; height:32px;
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:var(--t); font-size:15px; flex-shrink:0;
        }
        .modal-close:hover { background:var(--surface2); color:var(--text); }
        .modal-body { overflow-y:auto; padding:18px 24px 24px; flex:1; }
        .modal-summary {
            display:grid; grid-template-columns:repeat(3,1fr);
            gap:10px; margin-bottom:18px;
        }
        .mscard {
            background:var(--surface); border:1px solid var(--border);
            border-radius:11px; padding:13px; text-align:center;
        }
        .mscard-label { font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
        .mscard-val { font-size:15px; font-weight:700; }

        .tx-item {
            display:flex; align-items:center; justify-content:space-between;
            padding:11px 0; border-bottom:1px solid rgba(255,255,255,.04);
            gap:10px;
            animation:rowIn .3s ease both;
        }
        .tx-item:last-child { border-bottom:none; }
        .tx-left { display:flex; align-items:center; gap:11px; min-width:0; }
        .tx-icon { width:34px; height:34px; flex-shrink:0; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; }
        .tx-icon.in{background:rgba(34,211,165,.12)}
        .tx-icon.out{background:rgba(255,82,82,.12)}
        .tx-info { display:flex; flex-direction:column; min-width:0; }
        .tx-cat { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tx-date { font-size:11px; color:var(--text-muted); }
        .tx-amount { font-weight:700; font-size:13px; flex-shrink:0; }
        .tx-amount.in{color:var(--success)}
        .tx-amount.out{color:var(--danger)}

        .empty-state { text-align:center; padding:48px 20px; color:var(--text-muted); }

        /* Loading / Spinner */
        .spinner { width:22px; height:22px; border:2px solid rgba(255,255,255,.1); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg);} }

        /* Toast */
        .toast-container { position:fixed; bottom:20px; right:20px; z-index:300; display:flex; flex-direction:column; gap:8px; }
        .toast {
            background:var(--bg2); border:1px solid var(--border); border-radius:12px;
            padding:13px 16px; display:flex; align-items:center; gap:9px;
            font-size:13px; font-weight:500;
            box-shadow:0 8px 32px rgba(0,0,0,.4);
            animation:toastIn .4s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(40px);} to{opacity:1;transform:translateX(0);} }
        .toast.removing { animation:toastOut .3s ease forwards; }
        @keyframes toastOut { to{opacity:0;transform:translateX(40px);} }
        .toast.success{border-left:3px solid var(--success)}
        .toast.error{border-left:3px solid var(--danger)}
        .toast.info{border-left:3px solid var(--primary)}

        /* ── RESPONSIVE ── */
        @media(max-width:1100px) {
            .stats-grid { grid-template-columns:repeat(2,1fr); }
        }

        @media(max-width:768px) {
            .main { padding:16px 14px 60px; }
            .navbar { padding:0 14px; height:58px; }
            .nav-brand { font-size:16px; }
            .admin-badge { display:none; }
            .user-details { display:none; }
            .stats-grid { grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
            .stat-card { padding:16px; }
            .stat-number { font-size:17px; }
            .section-header { flex-direction:column; align-items:stretch; }
            .search-bar { max-width:100%; }
            .scroll-hint { display:block; }  /* show hint on mobile */
            /* table scrolls — no hiding columns */
            td, th { padding:11px 13px; }
        }

        @media(max-width:480px) {
            .stats-grid { grid-template-columns:1fr 1fr; gap:10px; }
            .stat-number { font-size:15px; }
            .stat-label { font-size:10px; }
            .modal-summary { grid-template-columns:1fr; }
            .mscard { padding:10px; }
            .toast-container { left:14px; right:14px; bottom:14px; }
            .toast { min-width:0; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V4M12 20V22M4 12H2M6.5 6.5L5 5M17.5 6.5L19 5M6.5 17.5L5 19M17.5 17.5L19 19M22 12H20M8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12Z" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
            <span class="nav-brand">UangKu Admin</span>
            <span class="admin-badge">Admin</span>
        </div>
        <div class="nav-right">
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <span class="user-name" id="userName">Admin</span>
                    <span class="user-email" id="userEmail">—</span>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">⎋ Keluar</button>
        </div>
    </nav>

    <main class="main">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card s-users">
                <div class="stat-top"><span class="stat-label">Total User</span><div class="stat-icon">👥</div></div>
                <div class="stat-number" id="totalUsers">—</div>
                <div class="stat-glow"></div>
            </div>
            <div class="stat-card s-income">
                <div class="stat-top"><span class="stat-label">Total Pemasukan</span><div class="stat-icon">💰</div></div>
                <div class="stat-number" id="totalAllIncome">—</div>
                <div class="stat-glow"></div>
            </div>
            <div class="stat-card s-expense">
                <div class="stat-top"><span class="stat-label">Total Pengeluaran</span><div class="stat-icon">💸</div></div>
                <div class="stat-number" id="totalAllExpense">—</div>
                <div class="stat-glow"></div>
            </div>
            <div class="stat-card s-balance">
                <div class="stat-top"><span class="stat-label">Net Balance</span><div class="stat-icon">⚖️</div></div>
                <div class="stat-number" id="totalBalance">—</div>
                <div class="stat-glow"></div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="section-header">
            <h2 class="section-title">👤 Daftar <span>User</span></h2>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Cari nama atau email..." oninput="filterUsers()">
            </div>
        </div>

        <!-- Scroll hint shown only on mobile via CSS -->
        <p class="scroll-hint">← geser untuk melihat semua kolom →</p>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Pengguna</th>
                        <th>No. Telepon</th>
                        <th>Pemasukan</th>
                        <th>Pengeluaran</th>
                        <th>Saldo</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="6" style="text-align:center;padding:48px">
                            <span class="spinner"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- Transaction Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Transaksi User</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-summary" id="modalSummary"></div>
                <div id="modalTxList"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.is_admin) { window.location.href = '/dashboard.html'; }

        // Populate navbar user info
        const uname = userData.name || userData.email || 'Admin';
        document.getElementById('userAvatar').textContent = uname.charAt(0).toUpperCase();
        document.getElementById('userName').textContent = uname;
        document.getElementById('userEmail').textContent = userData.email || '';

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID', { style:'currency', currency:'IDR', minimumFractionDigits:0 }).format(n || 0);
        }

        function toast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            const icons = { success:'✅', error:'❌', info:'ℹ️' };
            t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        let allUsers = [], allStats = {};

        async function loadUsers() {
            try {
                const [usersRes, statsRes] = await Promise.all([
                    fetch(`${API_URL}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_URL}/admin/stats`,  { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                if (!usersRes.ok) { if (usersRes.status === 401) logout(); throw new Error(); }
                allUsers = await usersRes.json();
                allStats = await statsRes.json();
                renderUsers(allUsers);
            } catch(e) {
                toast('Gagal memuat data user', 'error');
                document.getElementById('usersList').innerHTML =
                    '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">❌ Gagal memuat data</td></tr>';
            }
        }

        function renderUsers(users) {
            // Recalculate global totals from allStats (not filtered)
            const allIncome  = Object.values(allStats).reduce((a,s) => a + (s.income  || 0), 0);
            const allExpense = Object.values(allStats).reduce((a,s) => a + (s.expense || 0), 0);
            document.getElementById('totalUsers').textContent      = allUsers.length;
            document.getElementById('totalAllIncome').textContent  = formatRupiah(allIncome);
            document.getElementById('totalAllExpense').textContent = formatRupiah(allExpense);
            document.getElementById('totalBalance').textContent    = formatRupiah(allIncome - allExpense);

            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';

            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🔍</div><p>Tidak ada user ditemukan</p></div></td></tr>';
                return;
            }

            users.forEach((u, i) => {
                const s   = allStats[u.id] || { income: 0, expense: 0 };
                const bal = s.income - s.expense;
                const init = (u.name || u.email || '?').charAt(0).toUpperCase();
                const nameSafe  = (u.name  || 'User').replace(/'/g, "\\'");
                const emailSafe = (u.email || '').replace(/'/g, "\\'");

                const tr = document.createElement('tr');
                tr.style.animationDelay = `${i * 0.05}s`;
                tr.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <div class="user-av">${init}</div>
                            <div class="user-cell-info">
                                <span class="user-cell-name" title="${nameSafe}">${u.name || '—'}</span>
                                <span class="user-cell-email" title="${emailSafe}">${u.email || '—'}</span>
                            </div>
                        </div>
                    </td>
                    <td style="color:var(--text-sub)">${u.phone || '—'}</td>
                    <td class="amount-income">+ ${formatRupiah(s.income)}</td>
                    <td class="amount-expense">− ${formatRupiah(s.expense)}</td>
                    <td class="amount-balance">${formatRupiah(bal)}</td>
                    <td>
                        <button class="btn-view"
                            onclick="viewTransactions('${u.id}','${nameSafe}')">
                            📋 Lihat
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderUsers(q
                ? allUsers.filter(u =>
                    (u.name  || '').toLowerCase().includes(q) ||
                    (u.email || '').toLowerCase().includes(q))
                : allUsers
            );
        }

        async function viewTransactions(userId, userName) {
            document.getElementById('modalTitle').textContent = `📋 Transaksi — ${userName}`;
            document.getElementById('modalSummary').innerHTML =
                '<div style="grid-column:1/-1;text-align:center;padding:16px"><span class="spinner"></span></div>';
            document.getElementById('modalTxList').innerHTML = '';
            document.getElementById('modalOverlay').classList.add('open');

            try {
                const res = await fetch(`${API_URL}/admin/user-transactions/${userId}`,
                    { headers: { 'Authorization': `Bearer ${token}` } });
                const txs = await res.json();
                const s = allStats[userId] || { income: 0, expense: 0 };

                document.getElementById('modalSummary').innerHTML = `
                    <div class="mscard">
                        <div class="mscard-label">Pemasukan</div>
                        <div class="mscard-val" style="color:var(--success)">${formatRupiah(s.income)}</div>
                    </div>
                    <div class="mscard">
                        <div class="mscard-label">Pengeluaran</div>
                        <div class="mscard-val" style="color:var(--danger)">${formatRupiah(s.expense)}</div>
                    </div>
                    <div class="mscard">
                        <div class="mscard-label">Saldo</div>
                        <div class="mscard-val" style="color:var(--blue)">${formatRupiah(s.income - s.expense)}</div>
                    </div>
                `;

                if (!txs.length) {
                    document.getElementById('modalTxList').innerHTML =
                        '<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">📭</div><p>Belum ada transaksi</p></div>';
                    return;
                }

                document.getElementById('modalTxList').innerHTML = txs.map((t, i) => {
                    const isIn = t.type === 'income';
                    const date = new Date(t.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
                    const desc = t.description ? ` · ${t.description}` : '';
                    return `
                        <div class="tx-item" style="animation-delay:${i * 0.04}s">
                            <div class="tx-left">
                                <div class="tx-icon ${isIn ? 'in' : 'out'}">${isIn ? '📈' : '📉'}</div>
                                <div class="tx-info">
                                    <span class="tx-cat">${t.category || '—'}</span>
                                    <span class="tx-date">${date}${desc}</span>
                                </div>
                            </div>
                            <span class="tx-amount ${isIn ? 'in' : 'out'}">
                                ${isIn ? '+' : '−'} ${formatRupiah(t.amount)}
                            </span>
                        </div>
                    `;
                }).join('');

            } catch(e) {
                toast('Gagal memuat transaksi', 'error');
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }
        function handleOverlayClick(e) {
            if (e.target.id === 'modalOverlay') closeModal();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        loadUsers();
    </script>
</body>
</html>
