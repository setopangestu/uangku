<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Laporan - UangKu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        
        .report-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 30px;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #6c63ff;
        }
        
        .header h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .header h3 {
            font-size: 14px;
            color: #666;
            font-weight: normal;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        
        /* Info periode */
        .info-box {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 13px;
            color: #555;
            border-left: 4px solid #6c63ff;
        }
        
        /* Ringkasan 3 kolom */
        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .summary-card {
            flex: 1;
            min-width: 150px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border-top: 3px solid;
        }
        
        .summary-card.income { border-top-color: #22d3a5; }
        .summary-card.expense { border-top-color: #ff5252; }
        .summary-card.balance { border-top-color: #6c63ff; }
        
        .summary-card .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .summary-card .value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .summary-card.income .value { color: #22d3a5; }
        .summary-card.expense .value { color: #ff5252; }
        .summary-card.balance .value { color: #6c63ff; }
        
        /* Tabel */
        .table-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 20px 0 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .table-title h4 {
            font-size: 16px;
            color: #1a1a2e;
        }
        
        .table-title span {
            font-size: 12px;
            color: #888;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        th {
            background: #f0f0f0;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        
        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        
        tr:nth-child(even) {
            background: #fafafa;
        }
        
        .text-right {
            text-align: right;
        }
        
        .text-center {
            text-align: center;
        }
        
        .amount-income {
            color: #22d3a5;
            font-weight: 600;
        }
        
        .amount-expense {
            color: #ff5252;
            font-weight: 600;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .badge-income {
            background: #e6f9f0;
            color: #22d3a5;
        }
        
        .badge-expense {
            background: #ffe6e6;
            color: #ff5252;
        }
        
        .total-row {
            background: #f0f0f0;
            font-weight: bold;
        }
        
        .total-row td {
            padding: 10px 8px;
            border-top: 1px solid #ddd;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 15px;
            text-align: center;
            font-size: 10px;
            color: #aaa;
            border-top: 1px solid #eee;
        }
        
        /* Tombol download */
        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6c63ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(108,99,255,0.3);
            transition: transform 0.2s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .download-btn:hover {
            transform: scale(1.02);
            background: #5a52d5;
        }
        
        .download-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #ff5252;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            .report-container {
                padding: 20px;
            }
            .summary {
                flex-direction: column;
                gap: 12px;
            }
            .summary-card {
                min-width: auto;
            }
            th, td {
                padding: 6px 4px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="report-container" id="reportContainer">
        <div class="loading">⏳ Memuat data laporan...</div>
    </div>
    
    <button class="download-btn" id="downloadBtn">
        📄 Download PDF
    </button>

    <script>
        const API_URL = '/api';  // BUKAN localhost
        
        const urlParams = new URLSearchParams(window.location.search);
        const startDate = urlParams.get('startDate');
        const endDate = urlParams.get('endDate');
        
        let currentTransactions = [];
        
        async function loadReport() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error('Gagal memuat data');
                
                let transactions = await res.json();
                currentTransactions = transactions;
                
                if (startDate && endDate) {
                    transactions = transactions.filter(t => {
                        const txDate = new Date(t.created_at).toISOString().split('T')[0];
                        return txDate >= startDate && txDate <= endDate;
                    });
                }
                
                renderReport(transactions);
                
            } catch (error) {
                document.getElementById('reportContainer').innerHTML = `
                    <div class="error">❌ Gagal memuat data: ${error.message}</div>
                `;
                document.getElementById('downloadBtn').style.display = 'none';
            }
        }
        
        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR',
                minimumFractionDigits: 0
            }).format(n || 0);
        }
        
        function formatTanggal(dateStr) {
            const d = new Date(dateStr);
            return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        }
        
        function formatTanggalLong(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        }
        
        function renderReport(transactions) {
            let totalIncome = 0, totalExpense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            const balance = totalIncome - totalExpense;
            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userName = user.email || 'Pengguna';
            
            let periodeText = 'Semua Transaksi';
            if (startDate && endDate) {
                periodeText = `${formatTanggalLong(startDate)} - ${formatTanggalLong(endDate)}`;
            }
            
            const printDate = formatTanggalLong(new Date());
            
            let tableRows = '';
            transactions.forEach((t, idx) => {
                const isIncome = t.type === 'income';
                tableRows += `
                    <tr>
                        <td class="text-center">${idx + 1}</td>
                        <td>${formatTanggal(t.created_at)}</td>
                        <td>
                            <span class="badge ${isIncome ? 'badge-income' : 'badge-expense'}">
                                ${isIncome ? 'Masuk' : 'Keluar'}
                            </span>
                         </td>
                        <td>${t.category || '-'}</td>
                        <td>${t.description || '-'}</td>
                        <td class="text-right ${isIncome ? 'amount-income' : 'amount-expense'}">
                            ${isIncome ? '+' : '-'} ${formatRupiah(t.amount)}
                         </td>
                     </tr>
                `;
            });
            
            const html = `
                <div class="header">
                    <h1>LAPORAN KEUANGAN</h1>
                    <h3>UangKu</h3>
                    <p>Dicetak: ${printDate} | Pengguna: ${userName}</p>
                </div>
                
                <div class="info-box">
                    📅 Periode: ${periodeText}
                </div>
                
                <div class="summary">
                    <div class="summary-card income">
                        <div class="label">TOTAL PEMASUKAN</div>
                        <div class="value">${formatRupiah(totalIncome)}</div>
                    </div>
                    <div class="summary-card expense">
                        <div class="label">TOTAL PENGELUARAN</div>
                        <div class="value">${formatRupiah(totalExpense)}</div>
                    </div>
                    <div class="summary-card balance">
                        <div class="label">SALDO BERSIH</div>
                        <div class="value">${formatRupiah(balance)}</div>
                    </div>
                </div>
                
                <div class="table-title">
                    <h4>📋 Riwayat Transaksi</h4>
                    <span>${transactions.length} transaksi</span>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px">No</th>
                            <th style="width:85px">Tanggal</th>
                            <th style="width:70px">Tipe</th>
                            <th style="width:100px">Kategori</th>
                            <th>Deskripsi</th>
                            <th style="width:110px">Nominal</th>
                         </tr>
                    </thead>
                    <tbody>
                        ${tableRows || '<tr><td colspan="6" style="text-align:center; padding:40px;">Belum ada transaksi</td></tr>'}
                        <tr class="total-row">
                            <td colspan="5" class="text-right"><strong>TOTAL</strong></td>
                            <td class="text-right">
                                <div class="amount-income">+ ${formatRupiah(totalIncome)}</div>
                                <div class="amount-expense">- ${formatRupiah(totalExpense)}</div>
                                <strong>${formatRupiah(balance)}</strong>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="footer">
                    Laporan ini dibuat secara otomatis oleh UangKu • Aplikasi Keuangan Pribadi
                </div>
            `;
            
            document.getElementById('reportContainer').innerHTML = html;
        }
        
        async function downloadPDF() {
            const element = document.getElementById('reportContainer');
            const btn = document.getElementById('downloadBtn');
            
            if (!element) return;
            
            // Tampilkan loading
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Generating PDF...';
            btn.classList.add('loading');
            btn.disabled = true;
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `laporan_keuangan_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true, logging: false },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            try {
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                console.error('PDF generation error:', error);
                alert('Gagal membuat PDF. Coba lagi.');
            } finally {
                btn.innerHTML = originalText;
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        // Tambah event listener ke tombol download
        document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
        
        loadReport();
    </script>
</body>
</html>
