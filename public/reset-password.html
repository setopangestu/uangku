<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UangKu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d1a;
            color: #f0f0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 36px;
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        }
        .logo { text-align:center; margin-bottom:28px; }
        .logo h1 {
            font-size:28px; font-weight:800;
            background:linear-gradient(135deg,#fff 40%,#6c63ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .logo p { color:#8888aa; font-size:14px; margin-top:5px; }
        .input-group { margin-bottom:16px; }
        .input-group label {
            display:block; font-size:11px; font-weight:700;
            color:#8888aa; margin-bottom:7px; text-transform:uppercase;
            letter-spacing:0.7px;
        }
        input {
            width:100%; padding:13px 16px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:12px; color:#f0f0ff;
            font-family:inherit; font-size:16px; outline:none;
            transition:0.3s ease;
        }
        input:focus {
            border-color:#6c63ff;
            box-shadow:0 0 0 3px rgba(108,99,255,0.25);
        }
        .btn-submit {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#6c63ff,#5a52d5);
            color:#fff; border:none; border-radius:12px;
            font-family:inherit; font-size:15px; font-weight:700;
            cursor:pointer; transition:0.3s ease; margin-top:8px;
        }
        .btn-submit:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 32px rgba(108,99,255,0.35);
        }
        .btn-submit:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
        .alert {
            padding:12px 16px; border-radius:10px; font-size:13px;
            font-weight:500; margin-bottom:16px; display:none;
        }
        .alert.error {
            background:rgba(239,68,68,0.12);
            border:1px solid rgba(239,68,68,0.25);
            color:#ff8080; display:block;
        }
        .alert.success {
            background:rgba(34,211,165,0.12);
            border:1px solid rgba(34,211,165,0.25);
            color:#22d3a5; display:block;
        }
        .text-center { text-align:center; margin-top:16px; }
        .text-center a {
            color:#8888aa; text-decoration:none; font-size:13px;
        }
        .text-center a:hover { color:#6c63ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>UangKu</h1>
                <p>Reset Password</p>
            </div>

            <div id="alert" class="alert"></div>

            <div class="input-group">
                <label>Password Baru</label>
                <input type="password" id="new-password" placeholder="Min. 6 karakter">
            </div>
            <div class="input-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirm-password" placeholder="Ulangi password baru">
            </div>

            <button class="btn-submit" id="resetBtn" onclick="resetPassword()">Reset Password</button>

            <div class="text-center">
                <a href="/">← Kembali ke Login</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vcyajptjbzvjuzkpobyq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjeWFqcHRqYnp2anV6a3BvYnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTEzNzAsImV4cCI6MjA5NDQ4NzM3MH0.L8VShWGF_AY5VAISEjRyUTLJWbDCCJDmm_BDfvHpWSc';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function resetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('resetBtn');

            alertEl.className = 'alert';
            alertEl.style.display = 'none';

            if (!newPassword || !confirmPassword) {
                alertEl.className = 'alert error';
                alertEl.style.display = 'block';
                alertEl.textContent = '⚠️ Semua field wajib diisi';
                return;
            }

            if (newPassword.length < 6) {
                alertEl.className = 'alert error';
                alertEl.style.display = 'block';
                alertEl.textContent = '⚠️ Password minimal 6 karakter';
                return;
            }

            if (newPassword !== confirmPassword) {
                alertEl.className = 'alert error';
                alertEl.style.display = 'block';
                alertEl.textContent = '⚠️ Password tidak sama';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');

                if (!accessToken) {
                    alertEl.className = 'alert error';
                    alertEl.style.display = 'block';
                    alertEl.textContent = '⚠️ Token tidak valid. Minta ulang link reset.';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }

                const { error: sessionError } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });

                if (sessionError) throw new Error(sessionError.message);

                const { error: updateError } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (updateError) throw new Error(updateError.message);

                alertEl.className = 'alert success';
                alertEl.style.display = 'block';
                alertEl.textContent = '✅ Password berhasil direset! Silakan login.';

                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);

            } catch (error) {
                alertEl.className = 'alert error';
                alertEl.style.display = 'block';
                alertEl.textContent = '⚠️ ' + error.message;
            }

            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    </script>
</body>
</html>
